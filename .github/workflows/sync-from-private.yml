name: Sync from private

on:
  workflow_dispatch:
    inputs:
      private_ref:
        description: 'Private repo branch/ref to sync from'
        required: false
        default: 'main'
        type: string

permissions:
  contents: write

concurrency:
  group: sync-from-private
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout public (this repo)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Setup SSH for private repo access
        env:
          PRIVATE_REPO_DEPLOY_KEY: ${{ secrets.PRIVATE_REPO_DEPLOY_KEY }}
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$PRIVATE_REPO_DEPLOY_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -t ed25519,rsa github.com >> ~/.ssh/known_hosts 2>/dev/null
          cat > ~/.ssh/config <<'EOF'
          Host github-private
            HostName github.com
            User git
            IdentityFile ~/.ssh/deploy_key
            IdentitiesOnly yes
          EOF
          chmod 600 ~/.ssh/config

      - name: Clone private repo
        run: |
          git clone --depth=1 \
            --branch="${{ inputs.private_ref }}" \
            git@github-private:susumuishigami/hakone-geo-walker-dev.git \
            /tmp/private
          echo "PRIVATE_SHA=$(git -C /tmp/private rev-parse --short HEAD)" >> "$GITHUB_ENV"

      - name: Rsync private -> public (with excludes)
        run: |
          rsync -av --delete \
            --exclude='.git/' \
            --exclude='.github/workflows/' \
            --exclude='data/private/' \
            --exclude='CLAUDE.md' \
            --exclude='AGENTS.md' \
            --exclude='.claude/' \
            --exclude='scratch/' \
            --exclude='notes/' \
            --exclude='memo/' \
            --exclude='.private/' \
            --exclude='*.draft.md' \
            --exclude='*.wip.md' \
            /tmp/private/ ./

      - name: Commit & push if changes
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to sync."
            exit 0
          fi
          git commit -m "Sync from private (${PRIVATE_SHA})"
          git push origin HEAD:main

      - name: Cleanup SSH key
        if: always()
        run: rm -f ~/.ssh/deploy_key ~/.ssh/config
