# =============================================================================
# Sync from private dev repo to this Public repo
# =============================================================================
# このリポジトリ (Public, Open Science) は、別の Private 開発リポジトリ
# (susumuishigami/hakone-geo-walker-dev) で行った試行錯誤の成果を、
# 任意のタイミングで取り込むワークフローを採用しています。
#
#   Private (hakone-geo-walker-dev)  ──┐
#     - AIによる試行錯誤・WIP            │  workflow_dispatch (手動)
#     - メモ、ドラフト等もコミット可     │  rsync (--delete + excludes)
#                                        ▼
#   Public  (hakone-geo-walker)
#     - 整理された公開版のみ
#     - 同期コミットは github-actions[bot] が作成
#
# 認証:
#   - Private read-only access: Deploy Key (secrets.PRIVATE_REPO_DEPLOY_KEY)
#   - Public push: actions/checkout の GITHUB_TOKEN (contents: write)
#
# 除外ファイル/ディレクトリ (Private 側に存在しても Public へは持ち込まない):
#   - .github/workflows/  Public 側で独立管理
#       ※ GITHUB_TOKEN は workflow ファイルの変更を push できないため
#         (GitHub のセキュリティ仕様。permissions では解除不可)
#       ※ workflow を Private 側でも更新したら、Public 側でも別途同じ変更を適用すること
#   - data/private/       非公開データ
#   - CLAUDE.md, AGENTS.md, .claude/  AI関連の指示・ログ
#   - scratch/, notes/, memo/, .private/  作業メモ
#   - *.draft.md, *.wip.md  未完成ドラフト
#
# タグ運用 (Private が source of truth):
#   1. Private 側で先に annotated tag を打つ (例: `git tag -a v0.1 -m "..."; git push origin v0.1`)
#   2. このワークフローを実行し、version 欄に同じタグ名を指定 (例: "0.1" または "v0.1")
#   3. Private のそのタグの commit が Public に rsync される
#   4. Public 側にも同じタグ名 (v0.1) が打たれて push される
#   - これにより Private/Public 両方に同じタグが付き、相互の対応関係が追跡可能
#   - Public 側に同名タグが既にあれば fail fast で停止
#   - 間違えた場合は両側のタグを手動削除・付け直し可能
# =============================================================================

name: Sync from private

on:
  workflow_dispatch:
    inputs:
      # 前後空白は自動除去。v 無しなら自動で v を付与
      # Private 側に既に存在するタグ名を指定すること
      version:
        description: 'Version tag on private repo (例: 0.1, v0.2.1, 1.0)'
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: sync-from-private
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout public (this repo)
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Normalize version input
        id: version
        env:
          RAW_VERSION: ${{ inputs.version }}
        run: |
          stripped="$(printf '%s' "$RAW_VERSION" | sed -e 's/^[[:space:]]*//' -e 's/[[:space:]]*$//')"
          if [ -z "$stripped" ]; then
            echo "::error::version input is required (after stripping whitespace)"
            exit 1
          fi
          case "$stripped" in
            v*) ;;
            *)  stripped="v$stripped" ;;
          esac
          echo "Tag: '$stripped'"
          echo "value=$stripped" >> "$GITHUB_OUTPUT"

      - name: Verify tag does not already exist on Public
        env:
          TAG: ${{ steps.version.outputs.value }}
        run: |
          if git rev-parse -q --verify "refs/tags/$TAG" >/dev/null; then
            echo "::error::Tag '$TAG' already exists locally on Public. Delete it first or pick a different version."
            exit 1
          fi
          if git ls-remote --exit-code --tags origin "refs/tags/$TAG" >/dev/null 2>&1; then
            echo "::error::Tag '$TAG' already exists on Public remote. Delete it first or pick a different version."
            exit 1
          fi

      - name: Setup SSH for private repo access
        env:
          PRIVATE_REPO_DEPLOY_KEY: ${{ secrets.PRIVATE_REPO_DEPLOY_KEY }}
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$PRIVATE_REPO_DEPLOY_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -t ed25519,rsa github.com >> ~/.ssh/known_hosts 2>/dev/null
          cat > ~/.ssh/config <<'EOF'
          Host github-private
            HostName github.com
            User git
            IdentityFile ~/.ssh/deploy_key
            IdentitiesOnly yes
          EOF
          chmod 600 ~/.ssh/config

      - name: Clone private repo at tag
        env:
          TAG: ${{ steps.version.outputs.value }}
        run: |
          git clone --depth=1 --branch="$TAG" \
            git@github-private:susumuishigami/hakone-geo-walker-dev.git \
            /tmp/private
          echo "PRIVATE_SHA=$(git -C /tmp/private rev-parse --short HEAD)" >> "$GITHUB_ENV"

      - name: Rsync private -> public (with excludes)
        run: |
          rsync -avc --delete \
            --exclude='.git/' \
            --exclude='.github/workflows/' \
            --exclude='data/private/' \
            --exclude='CLAUDE.md' \
            --exclude='AGENTS.md' \
            --exclude='.claude/' \
            --exclude='scratch/' \
            --exclude='notes/' \
            --exclude='memo/' \
            --exclude='.private/' \
            --exclude='*.draft.md' \
            --exclude='*.wip.md' \
            /tmp/private/ ./

      - name: Commit & push if changes
        env:
          TAG: ${{ steps.version.outputs.value }}
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to sync (Public already matches Private $TAG)."
          else
            git commit -m "Sync $TAG from private (${PRIVATE_SHA})"
            git push origin HEAD:main
          fi

      - name: Create and push tag
        env:
          TAG: ${{ steps.version.outputs.value }}
        run: |
          git tag -a "$TAG" -m "Release $TAG (synced from private ${PRIVATE_SHA})"
          git push origin "refs/tags/$TAG"
          echo "Created tag: $TAG"

      - name: Cleanup SSH key
        if: always()
        run: rm -f ~/.ssh/deploy_key ~/.ssh/config
