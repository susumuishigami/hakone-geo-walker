name: Build Documentation

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-html:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Install uv
      uses: astral-sh/setup-uv@v3
      with:
        version: "latest"
    
    - name: Set up Python
      run: uv python install 3.14
    
    - name: Install dependencies
      run: uv sync
    
    - name: Build HTML
      run: uv run sphinx-build -b html docs docs/_build/html
    
    - name: Upload HTML artifact
      uses: actions/upload-artifact@v4
      with:
        name: html-docs
        path: docs/_build/html

  build-pdf:
    runs-on: ubuntu-latest
    continue-on-error: true
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Install uv
      uses: astral-sh/setup-uv@v3
      with:
        version: "latest"
    
    - name: Set up Python
      run: uv python install 3.14
    
    - name: Install dependencies
      run: uv sync
    
    - name: Install LaTeX
      run: |
        sudo apt-get update
        sudo apt-get install -y texlive-xetex texlive-latex-extra texlive-fonts-recommended latexmk
    
    - name: Build LaTeX
      run: uv run sphinx-build -b latex docs docs/_build/latex
    
    - name: Build PDF with latexmk
      run: |
        cd docs/_build/latex
        latexmk -pdf -xelatex hakone-geo-walker.tex || true
    
    - name: Upload PDF artifact
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: pdf-docs
        path: docs/_build/latex/*.pdf
